# URL Exclusion Rules Example
# This file demonstrates how to exclude URLs from crawling
# Copy this file to exclude.yaml or exclude.local.yaml and modify as needed
#
# Priority order (highest to lowest):
# 1. exclude.local.yaml (local overrides, not committed to repo)
# 2. exclude.yaml (project rules, can be committed)
# 3. EXCLUDE_RULES environment variable
# 4. --exclude CLI argument
#
# Available modes:
# - prefix: URL or path starts with the string (e.g., "/admin/" matches "http://example.com/admin/dashboard")
# - suffix: URL or path ends with the string (e.g., ".pdf" matches "http://example.com/document.pdf")
# - contains: URL or path contains the string
# - exact: URL or path exactly matches the string
# - regex: URL or path matches the regular expression pattern
#
# Note: Rules are checked against both the full URL and the pathname,
# so you can use paths like "/tags/" to match any URL containing that path.

# Exclude admin pages
- mode: prefix
  string: '/admin/'

# Exclude login and auth pages
- mode: prefix
  string: '/auth/'
- mode: prefix
  string: '/login'

# Exclude PDF files
- mode: suffix
  string: '.pdf'

# Exclude image files
- mode: suffix
  string: '.jpg'
- mode: suffix
  string: '.png'
- mode: suffix
  string: '.gif'

# Exclude URLs containing session parameters
- mode: contains
  string: 'session='
- mode: contains
  string: 'token='

# Exclude specific page
- mode: exact
  string: 'https://example.com/specific-page'

# Exclude URLs matching a pattern (e.g., pagination)
- mode: regex
  string: "\\?page=\\d+"

# Exclude search results
- mode: prefix
  string: '/search?'
